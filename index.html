<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RYZE · Copywriter Championship</title>
  <link rel="preconnect" href="https://api.dicebear.com" crossorigin>
  <style>
    :root {
      --bg: #0a0717;
      --bg-2: #120a24;
      --ink: #eaf1ff;
      --dim: #8b96b4;
      --cyan: #00e0ff;
      --pink: #ff3ca8;
      --yellow: #ffd93c;
      --gold: #ffc74a;
      --silver: #d2d8e4;
      --bronze: #e29970;
      --green: #35d48a;
      --red: #ff5d5d;
      --orange: #ff9e48;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: radial-gradient(ellipse at 20% 10%, rgba(0,224,255,0.08), transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(255,60,168,0.08), transparent 60%),
                  radial-gradient(ellipse at 50% 90%, rgba(255,217,60,0.05), transparent 60%),
                  var(--bg);
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 60px; }

    /* Title */
    .title-frame {
      text-align: center; margin-bottom: 6px;
      border: 2px solid var(--cyan);
      border-radius: 24px;
      padding: 18px 24px;
      background: linear-gradient(180deg, rgba(0,224,255,0.05), rgba(255,60,168,0.05));
      box-shadow: 0 0 0 2px rgba(0,224,255,0.2), inset 0 0 40px rgba(0,224,255,0.1);
    }
    .title-frame h1 {
      font-family: "Orbitron", "Inter", sans-serif;
      font-size: clamp(28px, 5vw, 54px); font-weight: 900; letter-spacing: 0.06em;
      margin: 0; line-height: 1; text-transform: uppercase;
      background: linear-gradient(180deg, #7ae7ff 0%, #00e0ff 50%, #00a5ff 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 22px rgba(0,224,255,0.6);
    }
    .title-frame .month {
      font-size: clamp(22px, 4vw, 44px); font-weight: 900;
      background: linear-gradient(180deg, #ffb4e4 0%, #ff3ca8 60%, #ff1b89 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 22px rgba(255,60,168,0.6);
    }
    .subtitle {
      text-align: center; margin: 12px 0 10px; font-size: 18px; color: var(--yellow);
      text-shadow: 0 0 14px rgba(255,217,60,0.5);
    }
    .meta-row {
      text-align: center; color: var(--dim); font-size: 12px; margin-bottom: 18px;
      font-variant-numeric: tabular-nums;
    }
    .meta-row .sep { opacity: 0.3; margin: 0 6px; }

    /* Goals mini */
    .goals-strip {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px;
    }
    .goal-mini {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
    }
    .goal-mini .lbl { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .goal-mini .v { font-size: 22px; font-weight: 800; margin: 2px 0; font-variant-numeric: tabular-nums; }
    .goal-mini .v .target { color: var(--dim); font-weight: 500; font-size: 14px; }
    .goal-mini .mini-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
    .goal-mini .mini-bar > i { display: block; height: 100%; border-radius: 6px; }
    .goal-mini.done .mini-bar > i { background: linear-gradient(90deg, var(--green), #14b06c); }
    .goal-mini.on .mini-bar > i { background: linear-gradient(90deg, var(--yellow), var(--orange)); }
    .goal-mini.behind .mini-bar > i { background: linear-gradient(90deg, var(--red), #c93a3a); }

    /* Columns */
    .columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    @media (max-width: 900px) { .columns { grid-template-columns: 1fr; } }

    .col {
      border: 2px solid var(--cyan);
      border-radius: 22px;
      padding: 20px 16px 18px;
      background: linear-gradient(180deg, rgba(0,224,255,0.04), transparent 40%);
      box-shadow: 0 0 0 2px rgba(0,224,255,0.15), inset 0 0 30px rgba(0,224,255,0.05);
    }
    .col.static  { border-color: var(--pink);   box-shadow: 0 0 0 2px rgba(255,60,168,0.15),   inset 0 0 30px rgba(255,60,168,0.05); background: linear-gradient(180deg, rgba(255,60,168,0.04), transparent 40%); }
    .col.variant { border-color: var(--yellow); box-shadow: 0 0 0 2px rgba(255,217,60,0.15), inset 0 0 30px rgba(255,217,60,0.05); background: linear-gradient(180deg, rgba(255,217,60,0.04), transparent 40%); }

    .col-head { text-align: center; margin-bottom: 14px; }
    .col-head .icon { font-size: 34px; line-height: 1; filter: drop-shadow(0 0 10px currentColor); }
    .col.video   .col-head { color: var(--cyan); }
    .col.static  .col-head { color: var(--pink); }
    .col.variant .col-head { color: var(--yellow); }
    .col-head h2 {
      font-family: "Orbitron", "Inter", sans-serif; font-weight: 900; letter-spacing: 0.1em;
      margin: 4px 0 0; font-size: 18px; text-transform: uppercase;
      text-shadow: 0 0 14px currentColor;
    }
    .crown { font-size: 34px; display: block; margin: 6px auto 2px;
      filter: drop-shadow(0 0 10px var(--gold)); animation: crown-bob 2.5s ease-in-out infinite; }
    @keyframes crown-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    /* Rows */
    .row { display: grid; grid-template-columns: 32px 44px 1fr; gap: 10px; align-items: center;
      padding: 7px 4px; border-radius: 10px; transition: background .2s; }
    .row + .row { border-top: 1px dashed rgba(255,255,255,0.04); }
    .rank {
      font-family: "Orbitron", monospace; font-weight: 900; font-size: 15px;
      color: var(--dim); text-align: center;
    }
    .rank.top-1 { color: var(--gold); text-shadow: 0 0 10px var(--gold); font-size: 17px; }
    .rank.top-2 { color: var(--silver); text-shadow: 0 0 8px var(--silver); }
    .rank.top-3 { color: var(--bronze); text-shadow: 0 0 8px var(--bronze); }

    .avatar {
      width: 44px; height: 44px; border-radius: 10px;
      background: rgba(255,255,255,0.05) center/cover no-repeat;
      border: 1px solid rgba(255,255,255,0.12);
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .info { min-width: 0; }
    .info .name-row {
      display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .info .count {
      font-variant-numeric: tabular-nums; font-weight: 800; font-size: 13px;
      margin-left: 6px;
    }
    .col.video   .info .count { color: var(--cyan); }
    .col.static  .info .count { color: var(--pink); }
    .col.variant .info .count { color: var(--yellow); }

    .neo-bar { height: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); overflow: hidden;
      position: relative; margin-top: 4px; border: 1px solid rgba(255,255,255,0.08); }
    .neo-bar > i { display: block; height: 100%; border-radius: 6px; transition: width .6s cubic-bezier(.2,.7,.2,1); }
    .col.video   .neo-bar > i { background: linear-gradient(90deg, #006a7d, var(--cyan));   box-shadow: 0 0 10px var(--cyan); }
    .col.static  .neo-bar > i { background: linear-gradient(90deg, #7a1c4f, var(--pink));   box-shadow: 0 0 10px var(--pink); }
    .col.variant .neo-bar > i { background: linear-gradient(90deg, #806608, var(--yellow)); box-shadow: 0 0 10px var(--yellow); }

    .delta { font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 4px;
      letter-spacing: 0.03em; margin-left: 4px; font-variant-numeric: tabular-nums; }
    .delta.up   { background: rgba(53,212,138,0.2); color: var(--green); }
    .delta.down { background: rgba(255,93,93,0.2);  color: var(--red); }
    .delta.new  { background: rgba(255,217,60,0.2); color: var(--yellow); }

    .state { text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }
    .state .spin { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--cyan);
      border-radius: 50%; animation: rot 1s linear infinite; margin: 0 auto 12px; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* Behind-pace */
    .behind-strip { margin: 22px 0; text-align: center; }
    .behind-pill { display: inline-block; margin: 3px; padding: 5px 12px; border-radius: 999px;
      background: rgba(255,93,93,0.12); color: var(--red); border: 1px solid rgba(255,93,93,0.3);
      font-size: 12px; font-weight: 700; }

    .foot { text-align: center; color: var(--dim); font-size: 11px; margin-top: 28px; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="state"><div class="spin"></div>Loading championship…</div>
  </div>

  <script>
    const DATA_URL = "./dashboard.json";
    const POLL_MS = 60 * 1000;

    // Remember ranks between renders so we can show ↑ / ↓ deltas
    const LS_KEY = "ryze-last-ranks-v1";
    function loadLastRanks() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
      catch { return {}; }
    }
    function saveLastRanks(r) { try { localStorage.setItem(LS_KEY, JSON.stringify(r)); } catch {} }

    function ago(iso) {
      if (!iso) return "unknown";
      const d = new Date(iso);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return `${Math.round(diff)}s ago`;
      if (diff < 3600) return `${Math.round(diff/60)}m ago`;
      if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
      return `${Math.round(diff/86400)}d ago`;
    }
    function escape(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
    }
    function avatar(name) {
      // DiceBear pixel-art avatar, deterministic by name
      const seed = encodeURIComponent(name);
      return `https://api.dicebear.com/9.x/pixel-art/svg?seed=${seed}&radius=8&backgroundType=gradientLinear&scale=95`;
    }

    function rankCol(colName, label, icon, entries, metric, cssClass, lastRanks, newRanks) {
      const filtered = entries.filter(r => r[metric] > 0)
                              .sort((a, b) => b[metric] - a[metric]);
      const max = filtered.length ? filtered[0][metric] : 1;

      const rows = filtered.map((r, i) => {
        const rank = i + 1;
        const key = `${colName}::${r.name}`;
        newRanks[key] = rank;
        const prev = lastRanks[key];
        let delta = "";
        if (prev === undefined) {
          // first render after reset or new copywriter
          if (Object.keys(lastRanks).length) delta = `<span class="delta new">NEW</span>`;
        } else if (prev > rank) {
          delta = `<span class="delta up">↑${prev - rank}</span>`;
        } else if (prev < rank) {
          delta = `<span class="delta down">↓${rank - prev}</span>`;
        }

        const rankClass = rank <= 3 ? `top-${rank}` : "";
        const pct = (r[metric] / max) * 100;
        const crown = rank === 1 ? `<span class="crown">👑</span>` : "";

        return `
          ${rank === 1 ? crown : ""}
          <div class="row">
            <div class="rank ${rankClass}">#${rank}</div>
            <div class="avatar" style="background-image:url('${avatar(r.name)}')"></div>
            <div class="info">
              <div class="name-row">
                <span style="overflow:hidden;text-overflow:ellipsis">${escape(r.name)}</span>
                ${delta}
                <span class="count">${r[metric]}</span>
              </div>
              <div class="neo-bar"><i style="width:${pct}%"></i></div>
            </div>
          </div>`;
      }).join("");

      return `
        <div class="col ${cssClass}">
          <div class="col-head">
            <div class="icon">${icon}</div>
            <h2>${label}</h2>
          </div>
          ${rows || `<div class="state">No entries yet.</div>`}
        </div>`;
    }

    function goalMini(g) {
      return `
        <div class="goal-mini ${g.status}">
          <div class="lbl">${escape(g.label)}</div>
          <div class="v">${g.current} <span class="target">/ ${g.target}</span></div>
          <div class="mini-bar"><i style="width:${Math.min(100, g.pct)}%"></i></div>
        </div>`;
    }

    function render(s) {
      const lastRanks = loadLastRanks();
      const newRanks = {};

      const goalsStrip = (s.goals || []).map(goalMini).join("");
      const behind = (s.behind_pace || []).map(b => `<span class="behind-pill">${escape(b)}</span>`).join("");

      const videoCol   = rankCol("video",   "Video Leaderboard",     "📹", s.leaderboard || [], "videos",     "video",   lastRanks, newRanks);
      const staticCol  = rankCol("static",  "Static Leaderboard",    "🖼️", s.leaderboard || [], "statics",    "static",  lastRanks, newRanks);
      const variantCol = rankCol("variant", "Variation Leaderboard", "🔀", s.leaderboard || [], "variations", "variant", lastRanks, newRanks);

      const wd = s.working_days || {};
      const today = s.today_adds || {};

      document.getElementById("app").innerHTML = `
        <div class="title-frame">
          <h1>Copywriter Championship</h1>
          <div class="month">${escape((s.month_name || "April 2026").toUpperCase())}</div>
        </div>
        <div class="subtitle">Who writes wins.</div>
        <div class="meta-row">
          Day ${escape(s.day_in_month)}
          <span class="sep">·</span> ${wd.elapsed}/${wd.total} working days
          <span class="sep">·</span> ${wd.left} left
          <span class="sep">·</span> today +${today.videos||0}v / +${today.statics||0}s / +${today.variations||0}var
          <span class="sep">·</span> ${s.ledger_size} ads tracked
          <span class="sep">·</span> updated ${ago(s.generated_at)}
        </div>

        <div class="goals-strip">${goalsStrip}</div>

        ${behind ? `<div class="behind-strip">${behind}</div>` : ""}

        <div class="columns">${videoCol}${staticCol}${variantCol}</div>

        <div class="foot">Auto-refresh every ${POLL_MS/1000}s · source ${DATA_URL}</div>
      `;

      // Persist ranks for next render's delta computation — only after the first real paint
      if (Object.keys(newRanks).length) saveLastRanks(newRanks);
    }

    function renderError(msg) {
      document.getElementById("app").innerHTML = `<div class="state" style="color:var(--red)">Load failed: ${escape(msg)}</div>`;
    }

    async function load() {
      try {
        const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const j = await r.json();
        render(j);
      } catch (e) { renderError(e.message); }
    }
    load();
    setInterval(load, POLL_MS);
  </script>
</body>
</html>
